{% extends 'base.html' %}
{% block title %}Changer le mot de passe{% endblock %}
{% block content %}
<div class="card" style="max-width:420px; margin:40px auto;">
  <h1 style="margin-top:0;">Changer le mot de passe</h1>
  {% if forced %}
  <div class="note-warn">Votre mot de passe est <strong>temporaire</strong>. Vous devez le
     changer avant de continuer.</div>
  {% endif %}
  <form method="post" action="{{ url_for('auth.change_password') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <p><label>Mot de passe actuel<br>
       <input type="password" name="current_password" required style="width:100%;"></label></p>
    <p><label>Nouveau mot de passe (min. 6 caractères)<br>
       <input type="password" name="new_password" required minlength="6" style="width:100%;"></label></p>
    <p><label>Confirmer le nouveau mot de passe<br>
       <input type="password" name="confirm_password" required minlength="6" style="width:100%;"></label></p>
    <button type="submit" class="primary" style="width:100%;">Enregistrer</button>
  </form>
</div>
{% endblock %}
